general {
    before_sleep_cmd = pgrep -f "quickshell.*lockscreen" || qs -p ~/.config/quickshell/lockscreen
    after_sleep_cmd  = niri msg action power-on-monitors
    ignore_dbus_inhibit = false
}

# Idle overlay, 5 min
listener {
    timeout   = 300
    on-timeout = quickshell -c ~/.config/quickshell/idle-overlay
    on-resume  = pkill -f "quickshell.*idle-overlay"
}

# Lock, 10 min
listener {
    timeout   = 600
    on-timeout = qs -p ~/.config/quickshell/lockscreen
}

# Monitors off 1s after lock
listener {
    timeout   = 601 
    on-timeout = niri msg action power-off-monitors
    on-resume  = niri msg action power-on-monitors
}

# Suspend, 15 min
listener {
    timeout   = 900
    on-timeout = systemctl suspend
}
