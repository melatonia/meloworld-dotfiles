general {
    lock_cmd = pkill -f "quickshell.*idle-overlay" ; sleep 0.2 ; pidof hyprlock || hyprlock
    before_sleep_cmd = pidof hyprlock || hyprlock
}

listener {
    timeout = 180
    on-timeout = quickshell -c ~/.config/quickshell/idle-overlay
    on-resume = pkill -f "quickshell.*idle-overlay"
}

listener {
    timeout = 300
    on-timeout = pidof hyprlock || hyprlock
}

listener {
    timeout = 600
    on-timeout = systemctl suspend
}
